  <link rel="stylesheet" href="assets/css/style.css"/>
  <style>
    body { background: var(--navy-dark); }

    /* ── HERO ── */
    .ms-hero {
      padding: 110px 0 50px;
      text-align: center;
      position: relative;
    }
    .ms-hero::before {
      content:''; position:absolute; top:0; left:0; right:0; bottom:0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,.1) 0%, transparent 65%);
      pointer-events:none;
    }
    .ms-badge {
      display:inline-block; font-family:var(--font-title);
      font-size:.7rem; letter-spacing:.2em; color:var(--gold);
      border:1px solid rgba(201,168,76,.35);
      padding:.4rem 1rem; border-radius:20px; margin-bottom:1.25rem;
    }
    .ms-hero h1 {
      font-family:var(--font-title);
      font-size:clamp(1.8rem,4vw,2.8rem);
      color:var(--white); margin-bottom:.75rem; line-height:1.2;
    }
    .ms-hero h1 em { color:var(--gold); font-style:normal; }
    .ms-hero-sub {
      font-family:var(--font-sub); font-size:.95rem;
      color:var(--gray); max-width:540px; margin:0 auto 1.5rem; line-height:1.7;
    }

    /* Badge statut utilisateur */
    .ms-user-status {
      display:inline-flex; align-items:center; gap:.6rem;
      background:rgba(201,168,76,.08); border:1px solid rgba(201,168,76,.2);
      border-radius:8px; padding:.6rem 1.25rem;
      font-family:var(--font-sub); font-size:.85rem; color:var(--off-white);
    }

    /* ── SECTION LAYOUT ── */
    .ms-section {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1.5rem 5rem;
    }
    .ms-section-header {
      display:flex; align-items:center; gap:.75rem;
      margin: 2.5rem 0 1.5rem;
    }
    .ms-section-title {
      font-family:var(--font-title); font-size:1rem;
      color:var(--gold); letter-spacing:.15em; text-transform:uppercase;
    }
    .ms-section-line {
      flex:1; height:1px; background:rgba(201,168,76,.2);
    }
    .ms-section-badge {
      font-size:.7rem; padding:.25rem .75rem; border-radius:20px;
      font-family:var(--font-title); letter-spacing:.1em;
    }
    .ms-section-badge.locked { background:rgba(255,255,255,.05); color:var(--gray); border:1px solid rgba(255,255,255,.1); }
    .ms-section-badge.unlocked { background:rgba(34,197,94,.1); color:#4ade80; border:1px solid rgba(34,197,94,.2); }
    .ms-section-badge.coming { background:rgba(201,168,76,.08); color:var(--gold); border:1px solid rgba(201,168,76,.2); }

    /* ── NIVEAUX DE DIPLÔME ── */
    .ms-levels {
      display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:3rem;
    }
    .ms-level-card {
      border-radius:12px; padding:1.5rem;
      text-align:center; position:relative; overflow:hidden;
    }
    .ms-level-card.expert {
      background:linear-gradient(135deg,rgba(13,27,62,.9),rgba(26,44,85,.7));
      border:1px solid rgba(201,168,76,.25);
    }
    .ms-level-card.elite {
      background:linear-gradient(135deg,rgba(7,13,30,.9),rgba(13,27,62,.8));
      border:1px solid rgba(232,201,106,.35);
    }
    .ms-level-card.ultimate {
      background:linear-gradient(135deg,rgba(0,0,0,.9),rgba(13,27,62,.9));
      border:1px solid rgba(255,215,0,.4);
      box-shadow:0 0 30px rgba(255,215,0,.08);
    }
    .ms-level-icon { font-size:2rem; margin-bottom:.6rem; }
    .ms-level-name {
      font-family:var(--font-title); font-size:.85rem;
      letter-spacing:.12em; margin-bottom:.3rem;
    }
    .ms-level-card.expert  .ms-level-name { color:var(--gold); }
    .ms-level-card.elite   .ms-level-name { color:#E8C96A; }
    .ms-level-card.ultimate .ms-level-name { color:#FFD700; }
    .ms-level-rank { font-size:.75rem; color:var(--gray); margin-bottom:.75rem; }
    .ms-level-desc { font-size:.78rem; color:var(--off-white); line-height:1.6; }

    /* ── GRILLE MISSIONS ── */
    .ms-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:1.1rem; margin-bottom:2rem;
    }
    .ms-card {
      background:linear-gradient(135deg,rgba(13,27,62,.85),rgba(26,44,85,.6));
      border-radius:12px; padding:1.4rem;
      position:relative; overflow:hidden;
      transition:transform .25s, border-color .25s;
    }
    .ms-card:hover { transform:translateY(-3px); }

    /* Accès complet */
    .ms-card.access-all { border:1px solid rgba(201,168,76,.2); }
    .ms-card.access-all:hover { border-color:rgba(201,168,76,.4); }

    /* Accès diplômés */
    .ms-card.access-diplome { border:1px solid rgba(232,201,106,.25); }
    .ms-card.access-diplome::before {
      content:''; position:absolute; top:0; right:0;
      width:60px; height:60px;
      background:radial-gradient(circle at 100% 0%,rgba(232,201,106,.1),transparent 70%);
    }

    /* Verrouillé */
    .ms-card.locked {
      border:1px solid rgba(255,255,255,.08);
      opacity:.6; filter:grayscale(.4);
    }
    .ms-card.locked::after {
      content:'🔒'; position:absolute; top:1rem; right:1rem;
      font-size:1rem;
    }

    .ms-card-type {
      font-family:var(--font-title); font-size:.6rem;
      letter-spacing:.18em; text-transform:uppercase; margin-bottom:.4rem;
    }
    .ms-card.access-all .ms-card-type { color:var(--gold); }
    .ms-card.access-diplome .ms-card-type { color:#E8C96A; }
    .ms-card.locked .ms-card-type { color:var(--gray); }

    .ms-card-title {
      font-family:var(--font-sub); font-weight:700;
      font-size:.95rem; color:var(--white);
      margin-bottom:.5rem; line-height:1.4;
    }
    .ms-card-desc {
      font-size:.8rem; color:var(--gray);
      line-height:1.6; margin-bottom:1rem;
    }
    .ms-card-tags {
      display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:1rem;
    }
    .ms-tag {
      font-size:.68rem; padding:.2rem .6rem; border-radius:20px;
      background:rgba(255,255,255,.06); color:var(--gray);
      border:1px solid rgba(255,255,255,.08);
    }
    .ms-card-footer {
      display:flex; align-items:center; justify-content:space-between; gap:.5rem;
    }
    .ms-card-remuneration {
      font-family:var(--font-title); font-size:.85rem; color:var(--gold);
    }
    .ms-card-btn {
      font-family:var(--font-title); font-size:.65rem;
      letter-spacing:.12em; text-transform:uppercase;
      padding:.4rem .9rem; border-radius:6px; cursor:pointer;
      transition:all .2s; text-decoration:none; border:none;
      white-space:nowrap;
    }
    .ms-card-btn.available {
      background:rgba(201,168,76,.15); color:var(--gold);
      border:1px solid rgba(201,168,76,.35);
    }
    .ms-card-btn.available:hover { background:rgba(201,168,76,.25); }
    .ms-card-btn.soon {
      background:rgba(255,255,255,.05); color:var(--gray);
      border:1px solid rgba(255,255,255,.1); cursor:default;
    }
    .ms-card-btn.locked-btn {
      background:transparent; color:var(--gray);
      border:1px solid rgba(255,255,255,.08); cursor:not-allowed;
    }

    /* ── COMMENT ÇA MARCHE ── */
    .ms-how {
      background:linear-gradient(135deg,rgba(13,27,62,.8),rgba(26,44,85,.5));
      border:1px solid rgba(201,168,76,.15); border-radius:14px;
      padding:2rem; margin-bottom:3rem;
    }
    .ms-how-title {
      font-family:var(--font-title); font-size:1rem; color:var(--gold);
      letter-spacing:.15em; text-align:center; margin-bottom:1.75rem;
    }
    .ms-how-steps {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:1.5rem;
    }
    .ms-how-step { text-align:center; }
    .ms-how-num {
      width:40px; height:40px; border-radius:50%;
      background:rgba(201,168,76,.15); border:1px solid rgba(201,168,76,.3);
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-title); font-size:.9rem; color:var(--gold);
      margin:0 auto .75rem;
    }
    .ms-how-step h4 {
      font-family:var(--font-sub); font-weight:700;
      font-size:.85rem; color:var(--white); margin-bottom:.4rem;
    }
    .ms-how-step p { font-size:.78rem; color:var(--gray); line-height:1.6; }

    /* ── CTA DIPLÔME ── */
    .ms-cta {
      text-align:center;
      background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(13,27,62,.5));
      border:1px solid rgba(201,168,76,.2); border-radius:14px;
      padding:2.5rem 2rem; margin-bottom:2rem;
    }
    .ms-cta h2 {
      font-family:var(--font-title); font-size:1.4rem;
      color:var(--gold); margin-bottom:.75rem;
    }
    .ms-cta p {
      font-size:.88rem; color:var(--gray);
      line-height:1.7; max-width:500px; margin:0 auto 1.5rem;
    }
    .ms-cta-btns { display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap; }

    /* Notice "bientôt disponible" */
    .ms-coming-notice {
      text-align:center;
      background:rgba(201,168,76,.06);
      border:1px dashed rgba(201,168,76,.2);
      border-radius:10px; padding:1.25rem;
      font-size:.82rem; color:var(--gray); margin-top:1rem;
    }
    .ms-coming-notice strong { color:var(--gold); }

    @media (max-width:640px) {
      .ms-levels { grid-template-columns:1fr; }
    }
  </style>
</head>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Statut utilisateur
  const monthData = AtlasChallengeVente.getCurrentMonthScore();
  const rank = AtlasChallengeVente.getDiplomeRank(monthData, 247);
  const badge = document.getElementById('userStatusBadge');

  if (rank === 'ultimate') {
    badge.innerHTML = '👑 Tu es <strong style="color:#FFD700;">Ultimate Closer</strong> ce mois-ci — toutes les missions sont débloquées';
    // Débloquer toutes les missions
    document.querySelectorAll('.ms-card.locked').forEach(c => {
      c.classList.remove('locked');
      c.querySelector('.ms-card-btn').className = 'ms-card-btn soon';
      c.querySelector('.ms-card-btn').textContent = 'Bientôt disponible';
      c.querySelector('.ms-card-btn').style.cursor = 'default';
    });
  } else if (rank === 'elite') {
    badge.innerHTML = '🥈 Tu es <strong style="color:#E8C96A;">Closer d\'Élite</strong> ce mois-ci — missions Élite et inférieures débloquées';
  } else if (rank === 'expert') {
    badge.innerHTML = '🥉 Tu es <strong style="color:var(--gold);">Expert Closer</strong> ce mois-ci — missions Expert débloquées';
    document.querySelectorAll('[id^="expertMission"]').forEach(c => {
      c.classList.remove('locked');
      c.querySelector('.ms-card-btn').className = 'ms-card-btn soon';
      c.querySelector('.ms-card-btn').textContent = 'Bientôt disponible';
    });
  } else {
    const pts = monthData.totalPoints;
    badge.innerHTML = `📊 ${pts} points ce mois · Aucun diplôme actif — <a href="challenge-vente.html" style="color:var(--gold);">rejoindre le challenge →</a>`;
  }
});
</script>
