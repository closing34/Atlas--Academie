      <p>Les présentes Conditions Générales de Vente (CGV) régissent les ventes de formations en ligne proposées par Atlas Académie. Toute commande implique l'acceptation pleine et entière des présentes CGV.</p>

      <h2 style="color:var(--white);font-family:var(--font-title);font-size:1.1rem;letter-spacing:.08em;margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid rgba(201,168,76,0.15);">Article 2 — Produits et services</h2>
      <p>Atlas Académie propose des formations numériques en ligne accessibles immédiatement après paiement, disponibles en accès à vie sur la plateforme. Les formations incluent : vidéos, supports PDF, exercices pratiques et accès aux outils de simulation IA.</p>

      <h2 style="color:var(--white);font-family:var(--font-title);font-size:1.1rem;letter-spacing:.08em;margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid rgba(201,168,76,0.15);">Article 3 — Prix et paiement</h2>
      <p>Les prix sont indiqués en euros TTC. Le paiement est exigible immédiatement à la commande. Les formations sont disponibles dès confirmation du paiement. Des facilités de paiement en 3 fois peuvent être proposées selon les offres en cours.</p>

      <h2 style="color:var(--white);font-family:var(--font-title);font-size:1.1rem;letter-spacing:.08em;margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid rgba(201,168,76,0.15);">Article 4 — Droit de rétractation et garantie</h2>
      <p>Conformément à la législation en vigueur, vous disposez d'un délai de 14 jours à compter de la date d'achat pour exercer votre droit de rétractation, à condition de ne pas avoir commencé à consommer le contenu numérique.</p>
      <p style="margin-top:1rem;">Atlas Académie propose une <strong style="color:var(--gold);">garantie satisfait ou remboursé de 30 jours</strong>. Si la formation ne correspond pas à vos attentes, contactez-nous à l'adresse indiquée dans les mentions légales pour un remboursement intégral sans justification.</p>

      <h2 style="color:var(--white);font-family:var(--font-title);font-size:1.1rem;letter-spacing:.08em;margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid rgba(201,168,76,0.15);">Article 5 — Propriété intellectuelle</h2>
      <p>L'ensemble des contenus (vidéos, textes, méthodes, supports) sont la propriété exclusive d'Atlas Académie et sont protégés par le droit d'auteur. Toute reproduction, diffusion ou utilisation commerciale est strictement interdite sans autorisation écrite préalable.</p>

      <h2 style="color:var(--white);font-family:var(--font-title);font-size:1.1rem;letter-spacing:.08em;margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid rgba(201,168,76,0.15);">Article 6 — Responsabilité</h2>
      <p>Les résultats présentés dans nos formations sont des exemples non contractuels. Les performances individuelles dépendent de l'implication personnelle, du contexte et de l'application des méthodes enseignées. Atlas Académie ne saurait être tenue responsable des résultats obtenus.</p>

      <h2 style="color:var(--white);font-family:var(--font-title);font-size:1.1rem;letter-spacing:.08em;margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid rgba(201,168,76,0.15);">Article 7 — Données personnelles</h2>
      <p>Les données collectées lors de l'achat sont utilisées uniquement pour la gestion de votre commande et l'envoi de votre accès à la formation. Elles ne sont pas revendues à des tiers. Pour plus d'informations, consultez notre <a href="confidentialite.html" style="color:var(--gold);">politique de confidentialité</a>.</p>

      <h2 style="color:var(--white);font-family:var(--font-title);font-size:1.1rem;letter-spacing:.08em;margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid rgba(201,168,76,0.15);">Article 8 — Droit applicable</h2>
