# ============================================================
# ATLAS ACADÉMIE — netlify.toml
# Configuration Netlify : Functions + Headers sécurité
# ============================================================

[build]
  publish   = "."
  functions = "functions"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# ── Headers de sécurité ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Cache assets statiques ──────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── CORS pour les Netlify Functions ────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Atlas-User-Id"

# ── Variables d'environnement (à configurer dans le dashboard) ──
# IMPORTANT : Ne jamais mettre les vraies clés ici.
# Aller dans : Netlify Dashboard → Site → Environment Variables
# Ajouter :
#   CLAUDE_API_KEY       = sk-ant-api03-...
#   SUPABASE_URL         = https://xxxx.supabase.co
#   SUPABASE_SERVICE_KEY = eyJhbGc...  (clé service_role — JAMAIS anon)
#   SITE_URL             = https://atlas-academie.netlify.app
#   STRIPE_SECRET_KEY    = sk_live_...  ← OBLIGATOIRE pour create-checkout.js
