/* Catalogue complet des challenges (16 au total) */
const CATALOGUE = [

/* Algo déterministe — 5 challenges par semaine (même résultat pour toute la semaine) */
function getWeekChallenges() {
  const now = new Date();
  const startOfYear = new Date(now.getFullYear(), 0, 1);
  const weekNum = Math.floor((now - startOfYear) / (7 * 24 * 3600 * 1000));
  const seed = now.getFullYear() * 100 + weekNum;

  // LCG simple
  let s = seed;
  function rand() { s = (s * 1664525 + 1013904223) & 0xffffffff; return Math.abs(s) / 0x7fffffff; }

  const indices = [];
  const pool = CATALOGUE.map((_, i) => i);
  while (indices.length < 5 && pool.length > 0) {
    const pick = Math.floor(rand() * pool.length);
    indices.push(pool.splice(pick, 1)[0]);
  }
  return indices.map(i => CATALOGUE[i]);
}

/* Timer reset (prochain lundi) */
function getNextMonday() {
  const now = new Date();
  const day = now.getDay();
  const daysUntilMonday = (8 - day) % 7 || 7;
  const next = new Date(now);
  next.setDate(now.getDate() + daysUntilMonday);
  next.setHours(0, 0, 0, 0);
  return next;
}

function formatTimer(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (d > 0) return `${d}j ${h % 24}h`;
  if (h > 0) return `${h}h ${m % 60}min`;
  return `${m}min ${s % 60}s`;
}

function updateTimer() {
  const el = document.getElementById('resetTimer');
  if (!el) return;
  const diff = getNextMonday() - new Date();
  el.textContent = formatTimer(Math.max(0, diff));
}

/* Lire les données gamification localStorage */
function getGamData() {
  try {
    return JSON.parse(localStorage.getItem('atlas_challenges_v1') || '{}');
  } catch { return {}; }
}

/* Calculer la progression d'un challenge selon les données dispo */
function getProgress(ch) {
  const gam = JSON.parse(localStorage.getItem('atlas_gamification_v1') || '{}');
  const usage = JSON.parse(localStorage.getItem('atlas_usage_v1') || '{}');

  switch (ch.id) {
    case 'msg_5':   return Math.min(5,  gam.weekMessages || 0);
    case 'msg_20':  return Math.min(20, gam.weekMessages || 0);
    case 'sim_1':   return Math.min(1,  gam.weekSims || 0);
    case 'sim_3':   return Math.min(3,  gam.weekSims || 0);
    case 'score_7': return (gam.bestScore >= 7) ? 1 : 0;
    case 'score_9': return (gam.bestScore >= 9) ? 1 : 0;
    case 'coach_2': return Math.min(2, (gam.weekCoaches || []).length);
    case 'coach_4': return Math.min(4, (gam.weekCoaches || []).length);
    case 'streak_3':return Math.min(3, gam.streak || 0);
    case 'streak_5':return Math.min(5, gam.streak || 0);
    case 'daily_7': return Math.min(7, gam.streak || 0);
    case 'xp_100':  return Math.min(100, gam.weekXp || 0);
    case 'xp_500':  return Math.min(500, gam.weekXp || 0);
    case 'quiz':    return localStorage.getItem('atlas_user_profile') ? 1 : 0;
    case 'msg_all4':return Math.min(4, (gam.weekCoaches || []).length);
    case 'sim_score_improve': return (gam.scoreImproved) ? 1 : 0;
    default: return 0;
  }
}

/* Rendu cards challenges */
function renderChallenges() {
  const challenges = getWeekChallenges();
  const gamData = getGamData();
  let completed = 0;
  let weekXp = 0;

  const html = challenges.map(ch => {
    const progress = getProgress(ch);
    const pct = Math.min(100, Math.round((progress / ch.target) * 100));
    const isDone = pct >= 100 || gamData['done_' + ch.id];

    if (isDone) { completed++; weekXp += ch.xp; }

    return `
      <div class="ch-card${isDone ? ' completed' : ''} fade-in">
        <div class="ch-card-icon">${ch.icon}</div>
        <div class="ch-card-type">${ch.type}</div>
        <div class="ch-card-title">${ch.title}</div>
        <div class="ch-card-desc">${ch.desc}</div>
        <div class="ch-card-progress">
          <div class="ch-card-progress-top">
            <span>${isDone ? 'Complété !' : progress + ' / ' + ch.target + ' ' + ch.unit}</span>
            <span>${pct}%</span>
          </div>
          <div class="ch-card-progress-track">
            <div class="ch-card-progress-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="ch-card-reward">
          ✦ +${ch.xp} XP
        </div>
        <a href="${ch.link}" class="ch-card-btn ${isDone ? 'done' : 'active'}">
          ${isDone ? '✓ Terminé' : 'Commencer →'}
        </a>
      </div>`;
  });

  document.getElementById('challengeGrid').innerHTML = html.join('');

  // Barre globale
  const pctGlobal = Math.round((completed / 5) * 100);
  document.getElementById('progressFill').style.width = pctGlobal + '%';
  document.getElementById('progressLabel').textContent = completed + ' / 5 challenges complétés';
  document.getElementById('progressXp').textContent = '+' + weekXp + ' XP gagnés cette semaine';

  // Total historique
  const totalXp = (gamData.totalChallengeXp || 0) + weekXp;
  document.getElementById('totalChallengeXp').childNodes[0].textContent = totalXp.toLocaleString('fr-FR') + ' ';
}

/* Historique des semaines passées (mockée + données réelles si dispo) */
function renderHistory() {
  const gamData = getGamData();
  const now = new Date();

  const history = [];
  for (let i = 1; i <= 4; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i * 7);
    const weekLabel = 'Sem. du ' + d.toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
    const mockDone = Math.random() > 0.35;
    const mockXp = mockDone ? Math.floor(Math.random() * 3 + 2) * 50 : 0;
    history.push({ week: weekLabel, done: mockDone, xp: mockXp });
  }

  const html = history.map(h => `
    <div class="ch-history-item">
      <div class="ch-history-week">${h.week}</div>
      <div class="ch-history-name">${h.done ? '5 challenges complétés' : 'Semaine incomplète'}</div>
      <div class="ch-history-status ${h.done ? 'done' : 'missed'}">${h.done ? '✓ Complété' : '✗ Manqué'}</div>
      <div class="ch-history-xp">${h.done ? '+' + h.xp + ' XP' : '—'}</div>
    </div>`).join('');

  document.getElementById('challengeHistory').innerHTML = html || '<div style="color:var(--gray);font-size:.85rem;padding:1rem 0;">Aucun historique pour l\'instant.</div>';
}

/* Init */
document.addEventListener('DOMContentLoaded', () => {
  renderChallenges();
  renderHistory();
  updateTimer();
  setInterval(updateTimer, 30000);
});
</script>
</body>
</html>
