    body { background: var(--navy-dark); }

    /* ── HERO ── */
    .ent-hero {
      padding: 120px 0 70px;
      position: relative;
      overflow: hidden;
    }
    .ent-hero::before {
      content:''; position:absolute; top:0; left:0; right:0; bottom:0;
      background: radial-gradient(ellipse at 60% 50%, rgba(201,168,76,.1) 0%, transparent 60%);
      pointer-events:none;
    }
    .ent-hero .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }
    .ent-hero-badge {
      display:inline-block; font-family:var(--font-title);
      font-size:.7rem; letter-spacing:.2em; color:var(--gold);
      border:1px solid rgba(201,168,76,.35);
      padding:.4rem 1rem; border-radius:20px; margin-bottom:1.25rem;
    }
    .ent-hero h1 {
      font-family:var(--font-title);
      font-size:clamp(2rem,4vw,3rem);
      color:var(--white); margin-bottom:1.25rem; line-height:1.2;
    }
    .ent-hero h1 em { color:var(--gold); font-style:normal; }
    .ent-hero-sub {
      font-family:var(--font-sub); font-size:1rem;
      color:var(--gray); line-height:1.8; margin-bottom:2rem;
    }
    .ent-hero-ctas {
      display:flex; gap:1rem; flex-wrap:wrap;
    }

    /* Dashboard preview card */
    .ent-preview {
      background: linear-gradient(135deg, rgba(13,27,62,.95), rgba(26,44,85,.8));
      border: 1px solid rgba(201,168,76,.25);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .ent-preview-header {
      display:flex; align-items:center; gap:.75rem;
      padding-bottom:1rem; border-bottom:1px solid rgba(201,168,76,.1);
      margin-bottom:1rem;
    }
    .ent-preview-title {
      font-family:var(--font-title); font-size:.8rem;
      color:var(--gold); letter-spacing:.15em;
    }
    .ent-preview-stat-row {
      display:grid; grid-template-columns:repeat(3,1fr); gap:.75rem; margin-bottom:1rem;
    }
    .ent-preview-stat {
      background:rgba(255,255,255,.04); border-radius:8px; padding:.75rem;
      text-align:center;
    }
    .ent-preview-stat-num {
      font-family:var(--font-title); font-size:1.2rem; color:var(--gold);
    }
    .ent-preview-stat-label {
      font-size:.65rem; color:var(--gray); letter-spacing:.08em; margin-top:.15rem;
    }
    .ent-preview-member {
      display:flex; align-items:center; gap:.65rem;
      padding:.5rem 0; border-bottom:1px solid rgba(255,255,255,.04);
    }
    .ent-preview-member:last-child { border-bottom:none; }
    .ent-preview-avatar {
      width:28px; height:28px; border-radius:50%;
      background:rgba(201,168,76,.15); border:1px solid rgba(201,168,76,.2);
      display:flex; align-items:center; justify-content:center;
      font-size:.8rem; flex-shrink:0;
    }
    .ent-preview-member-name {
      font-size:.78rem; color:var(--white); flex:1; font-weight:600;
    }
    .ent-preview-member-score {
      font-family:var(--font-title); font-size:.75rem; color:var(--gold);
    }
    .ent-preview-bar-wrap { flex:1; }
    .ent-preview-bar {
      height:4px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden;
    }
    .ent-preview-bar-fill {
      height:100%; border-radius:2px;
      background:linear-gradient(90deg,var(--gold-dark),var(--gold));
    }

    /* ── CHIFFRES ── */
    .ent-numbers {
      padding: 60px 0;
      border-top: 1px solid rgba(201,168,76,.1);
      border-bottom: 1px solid rgba(201,168,76,.1);
    }
    .ent-numbers .container {
      display:grid; grid-template-columns:repeat(4,1fr); gap:2rem; text-align:center;
    }
    .ent-num-value {
      font-family:var(--font-title); font-size:2.5rem; color:var(--gold);
      line-height:1;
    }
    .ent-num-label {
      font-size:.8rem; color:var(--gray); margin-top:.5rem; line-height:1.5;
    }

    /* ── FEATURES ── */
    .ent-features { padding: 80px 0; }
    .ent-features-title {
      font-family:var(--font-title); font-size:1.8rem;
      color:var(--white); text-align:center; margin-bottom:.75rem;
    }
    .ent-features-title em { color:var(--gold); font-style:normal; }
    .ent-features-sub {
      text-align:center; color:var(--gray); font-size:.9rem;
      max-width:500px; margin:0 auto 3rem; line-height:1.7;
    }
    .ent-features-grid {
      display:grid; grid-template-columns:repeat(3,1fr); gap:1.25rem;
    }
    .ent-feature-card {
      background:linear-gradient(135deg,rgba(13,27,62,.8),rgba(26,44,85,.5));
      border:1px solid rgba(201,168,76,.12);
      border-radius:12px; padding:1.5rem;
      transition:border-color .25s, transform .25s;
    }
    .ent-feature-card:hover {
      border-color:rgba(201,168,76,.3); transform:translateY(-3px);
    }
    .ent-feature-icon {
      font-size:1.8rem; margin-bottom:.9rem;
    }
    .ent-feature-title {
      font-family:var(--font-sub); font-weight:700;
      font-size:.95rem; color:var(--white); margin-bottom:.5rem;
    }
    .ent-feature-desc {
      font-size:.82rem; color:var(--gray); line-height:1.7;
    }

    /* ── COMMENT ÇA MARCHE ── */
    .ent-how { padding: 80px 0; background: rgba(13,27,62,.3); }
    .ent-how-title {
      font-family:var(--font-title); font-size:1.5rem;
      color:var(--white); text-align:center; margin-bottom:3rem;
    }
    .ent-how-title em { color:var(--gold); font-style:normal; }
    .ent-how-steps {
      display:grid; grid-template-columns:repeat(4,1fr); gap:2rem;
      max-width:900px; margin:0 auto;
    }
    .ent-how-step { text-align:center; position:relative; }
    .ent-how-step:not(:last-child)::after {
      content:'→';
      position:absolute; top:22px; right:-1rem;
      color:rgba(201,168,76,.3); font-size:1.2rem;
    }
    .ent-how-num {
      width:44px; height:44px; border-radius:50%;
      background:rgba(201,168,76,.12); border:1px solid rgba(201,168,76,.3);
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-title); font-size:.9rem; color:var(--gold);
      margin:0 auto .9rem;
    }
    .ent-how-step h4 {
      font-family:var(--font-sub); font-weight:700;
      font-size:.85rem; color:var(--white); margin-bottom:.4rem;
    }
    .ent-how-step p { font-size:.78rem; color:var(--gray); line-height:1.6; }

    /* ── OFFRES ── */
    .ent-plans { padding: 80px 0; }
    .ent-plans-title {
      font-family:var(--font-title); font-size:1.5rem;
      color:var(--white); text-align:center; margin-bottom:3rem;
    }
    .ent-plans-grid {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:1.25rem; max-width:900px; margin:0 auto;
    }
    .ent-plan {
      background:linear-gradient(135deg,rgba(13,27,62,.9),rgba(26,44,85,.7));
      border-radius:14px; padding:2rem;
      border:1px solid rgba(201,168,76,.15);
      position:relative;
    }
    .ent-plan.featured {
      border-color:rgba(201,168,76,.5);
      box-shadow:0 0 40px rgba(201,168,76,.1);
    }
    .ent-plan-badge {
      position:absolute; top:-12px; left:50%; transform:translateX(-50%);
      font-family:var(--font-title); font-size:.65rem; letter-spacing:.15em;
      background:linear-gradient(135deg,var(--gold-dark),var(--gold));
      color:var(--navy-dark); padding:.3rem .9rem; border-radius:20px;
      white-space:nowrap;
    }
    .ent-plan-name {
      font-family:var(--font-title); font-size:.9rem;
      color:var(--gold); letter-spacing:.12em; margin-bottom:.5rem;
    }
    .ent-plan-price {
      font-family:var(--font-title); font-size:2rem;
      color:var(--white); margin-bottom:.25rem; line-height:1;
    }
    .ent-plan-price span { font-size:1rem; color:var(--gray); }
    .ent-plan-users {
      font-size:.78rem; color:var(--gray); margin-bottom:1.5rem;
    }
    .ent-plan-features {
      list-style:none; padding:0; margin:0 0 1.5rem;
    }
    .ent-plan-features li {
      font-size:.82rem; color:var(--off-white);
      padding:.35rem 0; border-bottom:1px solid rgba(255,255,255,.05);
      display:flex; gap:.5rem; line-height:1.5;
    }
    .ent-plan-features li:last-child { border-bottom:none; }
    .ent-plan-features li::before { content:'✦'; color:var(--gold); flex-shrink:0; font-size:.65rem; margin-top:.25rem; }

    /* ── CTA FINAL ── */
    .ent-cta {
      padding: 80px 0;
      text-align: center;
      background: linear-gradient(180deg, transparent, rgba(201,168,76,.05));
    }
    .ent-cta h2 {
      font-family:var(--font-title); font-size:2rem;
      color:var(--gold); margin-bottom:1rem;
    }
    .ent-cta p {
      font-size:.95rem; color:var(--gray); max-width:500px;
      margin:0 auto 2rem; line-height:1.7;
    }
    .ent-cta-btns { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }

    @media (max-width:768px) {
      .ent-hero .container { grid-template-columns:1fr; }
      .ent-preview { display:none; }
      .ent-numbers .container { grid-template-columns:repeat(2,1fr); }
      .ent-features-grid { grid-template-columns:1fr; }
      .ent-how-steps { grid-template-columns:1fr 1fr; }
      .ent-plans-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
